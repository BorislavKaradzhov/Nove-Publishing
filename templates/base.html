<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}NOVE Publishing{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">NOVE Publishing</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'submission-list' %}">Submissions</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'author-list' %}">Authors</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'genre-list' %}">Genres</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'submission-create' %}">Submit Script</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-light text-center py-3 mt-auto">
        <p>&copy; 2026 NOVE Publishing. "Inspiring Authors One Script at a Time."</p>
    </footer>

</body>
</html>
