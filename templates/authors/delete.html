{% extends 'base.html' %}
{% block content %}
<div class="alert alert-danger">
    <h3>Are you sure you want to delete this author?</h3>
    <p>This action cannot be undone. All submissions associated with this author will also be deleted.</p>
</div>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-danger">Confirm Delete</button>
    <a href="{% url 'author-detail' object.pk %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
